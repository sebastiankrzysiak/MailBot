name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install pytest
          pip install fastapi openai google-api-python-client google-auth-oauthlib python-dotenv tqdm

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v
